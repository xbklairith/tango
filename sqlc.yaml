version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/database/queries/"
    schema: "internal/database/migrations/"
    gen:
      go:
        package: "db"
        out: "internal/database/db"
        sql_package: "database/sql"
        emit_json_tags: true
        emit_empty_slices: true
        emit_interface: true
        overrides:
          - column: "users.password_hash"
            go_struct_tag: 'json:"-"'
